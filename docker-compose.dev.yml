services:
  mongodb:
    image: mongo:latest
    container_name: securemessage-mongo-dev
    ports:
      - "27017:27017"
    volumes:
      - ./mongodb-data:/data/db
    env_file:
      - .env
    networks:
      - secure-network
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    image: eclipse-temurin:21-jre-alpine
    container_name: securemessage-backend-dev
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./backend/target/backend-0.0.1-SNAPSHOT.jar:/app/app.jar:ro
    command: [ "java", "-jar", "/app/app.jar" ]
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - secure-network

  frontend:
    image: nginx:alpine
    container_name: securemessage-frontend-dev
    ports:
      - "80:80"
    volumes:
      - ./front/dist:/usr/share/nginx/html:ro
      - ./front/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - secure-network

volumes:
  mongo-data-dev:


networks:
  secure-network:
    driver: bridge
